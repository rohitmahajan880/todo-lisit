<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Todo List</div>
    <div class="navbar-links">
      <a href="#" class="nav-link active">Home</a>
      <a href="#" class="nav-link">Tasks</a>
      <a href="#" class="nav-link">About</a>
    </div>
  </nav>
  <main class="app-shell">
    <h1>Todo List</h1>
    <form id="todo-form" class="todo-form">
      <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off" />
      <button type="submit">Add</button>
    </form>
    <div class="controls">
      <span id="remaining-count">0 items left</span>
      <button id="clear-completed" class="text-button">Clear completed</button>
    </div>
    <ul id="todo-list" class="todo-list"></ul>
  </main>
  <script src="script.js"></script>
</body>
</html>
